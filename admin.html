<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L7K ADMIN | SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000;
            --card: #080808;
            --border: #151515;
            --accent: #fff;
            --red: #ff3b3b;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #adminContent {
            display: none;
            width: 100%;
        }

        /* Login Section */
        #loginSection {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            font-family: 'Outfit';
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .login-error {
            color: var(--red);
            font-size: 0.7rem;
            font-weight: 800;
            margin-top: 15px;
            display: none;
            text-transform: uppercase;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: #050505;
            border-right: 1px solid var(--border);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: 0.3s;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: #555;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .nav-btn.active {
            color: #fff;
            background: #0a0a0a;
            border-color: var(--border);
        }

        .nav-btn:hover {
            color: #fff;
        }

        .main-content {
            margin-left: 250px;
            padding: 60px;
            flex-grow: 1;
        }

        h1 {
            font-family: 'Outfit';
            font-size: 2.5rem;
            letter-spacing: -2px;
            margin: 0 0 40px;
            text-transform: uppercase;
        }

        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Products Grid */
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .admin-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 4px;
        }

        .admin-card img {
            width: 100%;
            aspect-ratio: 1/1.2;
            object-fit: cover;
            border-radius: 2px;
            margin-bottom: 15px;
        }

        .admin-card h3 {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .admin-card p {
            color: #555;
            font-size: 0.8rem;
            font-weight: 800;
        }

        /* Forms */
        .admin-form {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            margin-bottom: 60px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid var(--border);
            padding: 15px;
            color: #fff;
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 950;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Drag & Drop */
        .drop-zone {
            width: 100%;
            height: 200px;
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover,
        .drop-zone.active {
            border-color: var(--accent);
            background: #0a0a0a;
        }

        #previewContainer img {
            position: relative;
            display: block;
            z-index: 2;
        }

        .drop-zone span {
            font-size: 0.7rem;
            font-weight: 800;
            color: #555;
            text-transform: uppercase;
            z-index: 2;
        }

        .drop-zone i {
            color: #555;
            z-index: 2;
        }

        /* Order Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border: 1px solid var(--border);
        }

        th {
            text-align: left;
            padding: 20px;
            background: #050505;
            font-size: 0.7rem;
            color: #444;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }

        .badge {
            padding: 5px 10px;
            font-size: 0.6rem;
            font-weight: 900;
            border-radius: 2px;
            text-transform: uppercase;
        }

        .badge-pending {
            background: #111;
            color: #555;
        }

        .badge-shipped {
            background: #fff;
            color: #000;
        }

        .action-flex {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .icon-btn {
            background: #0a0a0a;
            border: 1px solid var(--border);
            color: #555;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-btn:hover {
            border-color: #fff;
            color: #fff;
        }

        .icon-btn.red {
            color: var(--red);
            border-color: var(--red);
        }

        .icon-btn.red:hover {
            background: var(--red);
            color: #fff;
        }

        /* Responsive Admin */
        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            #adminContent {
                flex-direction: column !important;
            }

            .sidebar {
                width: 100%;
                height: 60px;
                position: fixed;
                top: 0;
                left: 0;
                flex-direction: row;
                padding: 0 15px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                overflow-x: auto;
                gap: 10px;
                background: #000;
                z-index: 1000;
                align-items: center;
                box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            }

            .sidebar h2 {
                display: none;
            }

            .nav-btn {
                padding: 0 15px;
                height: 40px;
                white-space: nowrap;
                font-size: 0.7rem;
                color: #888;
                border: 1px solid var(--border);
                background: #080808;
            }
            
            .nav-btn.active {
                color: #fff;
                border-color: #555;
            }

            .main-content {
                margin-left: 0;
                padding: 90px 20px 40px;
                width: 100%;
                box-sizing: border-box;
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 30px;
                text-align: center;
            }

            .admin-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .admin-card {
                padding: 10px;
            }

            .admin-card h3 {
                font-size: 0.75rem;
            }

            .admin-form {
                padding: 20px;
                margin: 0 auto 60px;
                border-left: none;
                border-right: none;
            }

            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }

            .login-card {
                padding: 30px;
                max-width: 90%;
            }
        }
    </style>
</head>

<body>
    <div id="loginSection">
        <div class="login-card">
            <h2>ACCÈS ADMIN</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="submit-btn" style="width: 100%;">SE CONNECTER</button>
                <div id="loginError" class="login-error">Accès refusé. Identifiants incorrects.</div>
            </form>
        </div>
    </div>

    <div id="adminContent" style="display: none; flex: 1; display: flex;">
        <div class="sidebar">
            <h2 style="font-family:'Outfit'; margin-bottom: 30px; letter-spacing:-1px;">L7K SYSTEM</h2>
            <button class="nav-btn active" onclick="showSection('orders')">
                <i data-lucide="shopping-cart"></i> Commandes
            </button>
            <button class="nav-btn" onclick="showSection('inventory')">
                <i data-lucide="package"></i> Inventaire
            </button>
            <button class="nav-btn" onclick="showSection('add-product')">
                <i data-lucide="plus-circle"></i> Ajouter Produit
            </button>
        </div>

        <div class="main-content">
            <!-- ORDERS SECTION -->
            <div id="orders" class="section active">
                <h1>GESTION COMMANDES</h1>
                <table>
                    <thead>
                        <tr>
                            <th>CLIENT</th>
                            <th>ARTICLES</th>
                            <th>TOTAL</th>
                            <th>STATUT</th>
                            <th>ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody">
                        <tr>
                            <td colspan="5" style="text-align:center; padding:50px; color:#222;">Chargement...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- INVENTORY SECTION -->
            <div id="inventory" class="section">
                <h1>INVENTAIRE PRODUITS</h1>
                <div class="admin-grid" id="inventoryGrid">
                    <!-- Products list -->
                </div>
            </div>

            <!-- ADD PRODUCT SECTION -->
            <div id="add-product" class="section">
                <h1>NOUVEAU PRODUIT</h1>
                <form id="productForm" class="admin-form" onsubmit="handleProductSubmit(event)">
                    <div class="form-group">
                        <label class="form-label">Nom du Produit</label>
                        <input type="text" id="p-name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Prix (MAD)</label>
                        <input type="number" id="p-price" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="p-desc" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Photos du Produit (Drop or Click)</label>
                        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                            <i data-lucide="image-plus" id="dropIcon"></i>
                            <span id="dropText">Glissez des images ici ou cliquez</span>
                            <div id="previewContainer" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; width: 100%;"></div>
                        </div>
                        <input type="file" id="fileInput" hidden accept="image/*" multiple>
                    </div>
                    <div class="form-group">
                        <label class="form-label">OU URLs Images (Séparées par virgules)</label>
                        <input type="text" id="p-img" placeholder="https://img1.jpg, https://img2.jpg">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tailles (Séparées par virgules)</label>
                        <input type="text" id="p-sizes" value="S, M, L, XL, XXL">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Catégorie</label>
                        <select id="p-category" required>
                            <option value="Tees">T-Shirts</option>
                            <option value="Hoodies">Hoodies</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-btn" style="width: 100%;">PUBLIER LE DROP</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.40.0/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://exqmtppdpupkesbqrfic.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sJIZxFReSHq31in0eSATXw_4l8a0oZZ';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('loginError');

            if (user === 'hakimlaachiri' && pass === 'Maroc2020') {
                sessionStorage.setItem('l7k_admin_logged', 'true');
                initAdmin();
            } else {
                error.style.display = 'block';
            }
        }

        function initAdmin() {
            const isLogged = sessionStorage.getItem('l7k_admin_logged');
            if (isLogged === 'true') {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminContent').style.display = 'flex';
                fetchOrders();
                fetchInventory();
                setTimeout(() => lucide.createIcons(), 500);
            }
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        async function fetchOrders() {
            const body = document.getElementById('ordersBody');
            try {
                const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                if (!data || data.length === 0) {
                    body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; color:#555;">Aucune commande trouvée.</td></tr>';
                    return;
                }

                body.innerHTML = data.map(o => `
                    <tr>
                        <td>
                            <div style="font-weight: 900; color: #fff; font-size: 0.9rem;">${o.customer_name || 'N/A'}</div>
                            <div style="color: #555; font-size: 0.75rem; margin-top: 4px;">
                                <i data-lucide="phone" style="width:10px; height:10px; vertical-align:middle;"></i> ${o.customer_phone || 'N/A'}<br>
                                <i data-lucide="map-pin" style="width:10px; height:10px; vertical-align:middle;"></i> ${o.customer_city || 'N/A'}<br>
                                <i data-lucide="home" style="width:10px; height:10px; vertical-align:middle;"></i> ${o.customer_address || 'N/A'}
                            </div>
                        </td>
                        <td>
                            <div style="display:flex; flex-direction:column; gap:4px;">
                                ${(o.items || []).map(i => `
                                    <div style="background: #111; padding: 4px 8px; border-radius: 2px;">
                                        <span style="color: #fff; font-weight: 800;">${i.qty}x</span> ${i.name} 
                                        <span style="color: #555; font-weight: 900; margin-left: 5px;">[${i.size || 'N/A'}]</span>
                                    </div>
                                `).join('')}
                            </div>
                        </td>
                        <td><b style="color: #fff;">Dh ${parseFloat(o.total || 0).toFixed(2)}</b></td>
                        <td><span class="badge ${o.status === 'pending' ? 'badge-pending' : 'badge-shipped'}">${o.status}</span></td>
                        <td>
                            <div style="display:flex; gap:5px;">
                                <button class="icon-btn ${o.status === 'shipped' ? 'active' : ''}" onclick="updateOrderStatus('${o.id}', 'shipped')" title="Marquer comme expédié">
                                    <i data-lucide="check"></i>
                                </button>
                                <button class="icon-btn red" onclick="deleteOrder('${o.id}')" title="Supprimer la commande">
                                    <i data-lucide="trash-2"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                console.error("Fetch error:", err);
                body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:50px; color:var(--red);">Erreur lors du chargement des commandes.</td></tr>';
            }
        }

        async function fetchInventory() {
            const grid = document.getElementById('inventoryGrid');
            try {
                const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
                if (error) throw error;

                if (!data || data.length === 0) {
                    grid.innerHTML = '<p style="padding:40px; color:#555;">L\'inventaire est vide.</p>';
                    return;
                }

                grid.innerHTML = data.map(p => `
                    <div class="admin-card">
                        <img src="${p.images?.[0] || 'https://via.placeholder.com/300'}" alt="">
                        <h3>${p.name}</h3>
                        <p>Dh ${parseFloat(p.price || 0).toFixed(2)}</p>
                        <div class="action-flex">
                            <button class="icon-btn red" onclick="deleteProduct('${p.id}')"><i data-lucide="trash-2"></i></button>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                console.error("Inventory error:", err);
                grid.innerHTML = '<p style="padding:40px; color:var(--red);">Erreur lors du chargement de l\'inventaire.</p>';
            }
        }

        async function handleProductSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;

            try {
                const fileInput = document.getElementById('fileInput');
                const urlInput = document.getElementById('p-img');

                let finalImages = [];

                // Handle URLs
                if (urlInput.value.trim() !== '') {
                    finalImages = urlInput.value.split(',').map(url => url.trim()).filter(url => url !== '');
                }

                // Handle Files
                if (fileInput.files && fileInput.files.length > 0) {
                    for (let i = 0; i < fileInput.files.length; i++) {
                        const base64Img = await toBase64(fileInput.files[i]);
                        finalImages.push(base64Img);
                    }
                }

                if (finalImages.length === 0) {
                    alert('Veuillez ajouter au moins une photo ou un lien URL.');
                    return;
                }

                btn.innerText = 'PUBLICATION...';
                btn.disabled = true;

                const product = {
                    name: document.getElementById('p-name').value,
                    price: parseFloat(document.getElementById('p-price').value),
                    description: document.getElementById('p-desc').value,
                    images: finalImages,
                    sizes: document.getElementById('p-sizes').value.split(',').map(s => s.trim()),
                    category: document.getElementById('p-category').value
                };

                const { error } = await supabase.from('products').insert([product]);
                if (error) throw error;

                alert('Produit ajouté!');
                location.reload();
            } catch (err) {
                console.error("Submit error:", err);
                alert('Erreur lors de la publication.');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Drop Zone Logic
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const dropText = document.getElementById('dropText');
        const dropIcon = document.getElementById('dropIcon');

        ['dragover', 'dragleave', 'drop'].forEach(evt => {
            dropZone.addEventListener(evt, e => {
                e.preventDefault();
                dropZone.classList.toggle('active', evt === 'dragover');
            });
        });

        dropZone.addEventListener('drop', e => {
            fileInput.files = e.dataTransfer.files;
            handlePreview(fileInput.files);
        });

        fileInput.addEventListener('change', () => {
            handlePreview(fileInput.files);
        });

        function handlePreview(files) {
            previewContainer.innerHTML = ''; // Clear existing
            if (files && files.length > 0) {
                dropText.style.display = 'none';
                dropIcon.style.display = 'none';
                
                Array.from(files).forEach(file => {
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = e => {
                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.style.width = '80px';
                            img.style.height = '80px';
                            img.style.objectFit = 'cover';
                            img.style.borderRadius = '4px';
                            previewContainer.appendChild(img);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            } else {
                dropText.style.display = 'block';
                dropIcon.style.display = 'block';
            }
        }

        async function updateOrderStatus(id, status) {
            try {
                const { error } = await supabase.from('orders').update({ status }).eq('id', id);
                if (error) throw error;
                await fetchOrders(); // Re-render table
            } catch (err) {
                console.error("Update error:", err);
                alert("Erreur lors de la mise à jour du statut.");
            }
        }

        async function deleteOrder(id) {
            if (confirm('Supprimer cette commande définitivement?')) {
                try {
                    const { error } = await supabase.from('orders').delete().eq('id', id);
                    if (error) throw error;
                    await fetchOrders(); // Re-render table immediately
                } catch (err) {
                    console.error("Delete error:", err);
                    alert("Erreur lors de la suppression.");
                }
            }
        }

        async function deleteProduct(id) {
            if (confirm('Supprimer ce produit de l\'inventaire?')) {
                try {
                    const { error } = await supabase.from('products').delete().eq('id', id);
                    if (error) throw error;
                    await fetchInventory(); // Re-render grid immediately
                } catch (err) {
                    console.error("Delete product error:", err);
                    alert("Erreur lors de la suppression du produit.");
                }
            }
        }

        // Initial Load
        initAdmin();
    </script>
</body>

</html>
